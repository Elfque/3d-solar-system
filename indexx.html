<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Solar System with Planet Popups</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        font-family: "Arial", sans-serif;
      }

      /* Planet Tooltip Popup Style */
      .planet-tooltip {
        position: absolute;
        background: linear-gradient(
          135deg,
          rgba(0, 0, 0, 0.95) 0%,
          rgba(30, 30, 50, 0.95) 100%
        );
        backdrop-filter: blur(10px);
        border-radius: 12px;
        padding: 0;
        min-width: 280px;
        max-width: 320px;
        color: white;
        box-shadow:
          0 8px 32px rgba(0, 0, 0, 0.3),
          0 0 0 2px rgba(255, 215, 0, 0.3);
        z-index: 1000;
        pointer-events: none;
        animation: fadeInUp 0.3s ease-out;
        font-size: 14px;
        transform-origin: bottom center;
      }

      .planet-tooltip::before {
        content: "";
        position: absolute;
        bottom: 100%;
        left: 50%;
        transform: translateX(-50%);
        border-width: 8px;
        border-style: solid;
        border-color: transparent transparent rgba(0, 0, 0, 0.95) transparent;
      }

      .tooltip-header {
        background: linear-gradient(135deg, #ffd700 0%, #ffaa00 100%);
        padding: 12px 16px;
        border-radius: 12px 12px 0 0;
        color: #000;
        font-weight: bold;
        font-size: 18px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .tooltip-header span:first-child {
        font-size: 24px;
      }

      .tooltip-body {
        padding: 16px;
        line-height: 1.5;
      }

      .planet-detail {
        display: flex;
        justify-content: space-between;
        padding: 6px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }

      .planet-detail-label {
        font-weight: bold;
        color: #ffd700;
      }

      .fun-fact {
        margin-top: 12px;
        padding: 8px;
        background: rgba(255, 215, 0, 0.1);
        border-radius: 8px;
        border-left: 3px solid #ffd700;
        font-style: italic;
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(20px) scale(0.9);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      .tooltip-close {
        position: absolute;
        top: 8px;
        right: 12px;
        cursor: pointer;
        font-size: 20px;
        color: #000;
        font-weight: bold;
        pointer-events: auto;
        transition: transform 0.2s;
      }

      .tooltip-close:hover {
        transform: scale(1.1);
      }

      /* Info panel */
      .info {
        position: absolute;
        top: 20px;
        left: 20px;
        color: white;
        background: rgba(0, 0, 0, 0.7);
        padding: 10px 20px;
        border-radius: 10px;
        font-size: 14px;
        z-index: 100;
        pointer-events: none;
        backdrop-filter: blur(5px);
      }

      /* Controls hint */
      .controls {
        position: absolute;
        bottom: 20px;
        left: 20px;
        color: white;
        background: rgba(0, 0, 0, 0.7);
        padding: 8px 15px;
        border-radius: 8px;
        font-size: 12px;
        z-index: 100;
        pointer-events: none;
        backdrop-filter: blur(5px);
      }

      /* Hover effect for planets */
      .planet-hover-glow {
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div class="info">
      <h2>🌌 Solar System 3D</h2>
      <p>✨ Click on any planet to see information ✨</p>
    </div>
    <div class="controls">
      🖱️ Drag to rotate view | Scroll to zoom | Click planets for info
    </div>

    <!-- Planet Tooltip Container -->
    <div id="planetTooltip" class="planet-tooltip" style="display: none">
      <div class="tooltip-header">
        <span id="tooltipEmoji">🪐</span>
        <span id="tooltipName">Planet Name</span>
      </div>
      <div class="tooltip-body" id="tooltipBody">
        <!-- Planet info will be inserted here -->
      </div>
      <div class="tooltip-close" id="tooltipClose">×</div>
    </div>

    <!-- Import Three.js and add-ons -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
        }
      }
    </script>

    <script type="module">
      import * as THREE from "three";
      import { OrbitControls } from "three/addons/controls/OrbitControls.js";
      import {
        CSS2DRenderer,
        CSS2DObject,
      } from "three/addons/renderers/CSS2DRenderer.js";

      // --- Setup Scene, Camera, Renderers ---
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x050b1a);
      scene.fog = new THREE.FogExp2(0x050b1a, 0.0005);

      // Perspective Camera
      const camera = new THREE.PerspectiveCamera(
        45,
        window.innerWidth / window.innerHeight,
        0.1,
        1000,
      );
      camera.position.set(0, 20, 40);
      camera.lookAt(0, 0, 0);

      // WebGL Renderer
      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.shadowMap.enabled = true;
      document.body.appendChild(renderer.domElement);

      // CSS2 Renderer for text labels
      const labelRenderer = new CSS2DRenderer();
      labelRenderer.setSize(window.innerWidth, window.innerHeight);
      labelRenderer.domElement.style.position = "absolute";
      labelRenderer.domElement.style.top = "0px";
      labelRenderer.domElement.style.left = "0px";
      labelRenderer.domElement.style.pointerEvents = "none";
      document.body.appendChild(labelRenderer.domElement);

      // --- Controls ---
      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.05;
      controls.autoRotate = false;
      controls.enableZoom = true;
      controls.enablePan = true;
      controls.zoomSpeed = 1.2;
      controls.rotateSpeed = 0.8;
      controls.target.set(0, 0, 0);

      // --- Lighting ---
      const ambientLight = new THREE.AmbientLight(0x404060);
      scene.add(ambientLight);

      const sunLight = new THREE.PointLight(0xffaa66, 2, 100);
      sunLight.position.set(0, 0, 0);
      sunLight.castShadow = true;
      scene.add(sunLight);

      const fillLight = new THREE.DirectionalLight(0xffffff, 0.5);
      fillLight.position.set(1, 2, 1);
      scene.add(fillLight);

      const backLight = new THREE.DirectionalLight(0x88aaff, 0.3);
      backLight.position.set(-1, -1, -0.5);
      scene.add(backLight);

      // --- Stars Background ---
      const starGeometry = new THREE.BufferGeometry();
      const starCount = 3000;
      const starPositions = new Float32Array(starCount * 3);
      for (let i = 0; i < starCount; i++) {
        starPositions[i * 3] = (Math.random() - 0.5) * 2000;
        starPositions[i * 3 + 1] = (Math.random() - 0.5) * 1000;
        starPositions[i * 3 + 2] = (Math.random() - 0.5) * 500 - 100;
      }
      starGeometry.setAttribute(
        "position",
        new THREE.BufferAttribute(starPositions, 3),
      );
      const starMaterial = new THREE.PointsMaterial({
        color: 0xffffff,
        size: 0.3,
        transparent: true,
        opacity: 0.8,
      });
      const stars = new THREE.Points(starGeometry, starMaterial);
      scene.add(stars);

      // --- Planet Data ---
      const planetsData = [
        {
          name: "Mercury",
          emoji: "☿️",
          color: 0xbc9a6c,
          size: 0.4,
          distance: 3.5,
          speed: 0.04,
          info: "The smallest and fastest planet. Mercury has extreme temperature variations from -173°C to 427°C.",
        },
        {
          name: "Venus",
          emoji: "♀️",
          color: 0xe6b800,
          size: 0.5,
          distance: 5,
          speed: 0.025,
          info: 'Often called Earth\'s "sister planet" due to similar size. Has a toxic atmosphere and is the hottest planet.',
        },
        {
          name: "Earth",
          emoji: "🌍",
          color: 0x2288ff,
          size: 0.55,
          distance: 6.8,
          speed: 0.02,
          info: "Our home planet. The only place we know of that harbors life. 71% covered by water.",
        },
        {
          name: "Mars",
          emoji: "♂️",
          color: 0xcc6644,
          size: 0.5,
          distance: 8.5,
          speed: 0.017,
          info: "The Red Planet. Home to Olympus Mons, the largest volcano in the solar system.",
        },
        {
          name: "Jupiter",
          emoji: "♃",
          color: 0xd8a27a,
          size: 1.2,
          distance: 12,
          speed: 0.009,
          info: "The largest planet. A gas giant with a Great Red Spot, a massive storm larger than Earth.",
        },
        {
          name: "Saturn",
          emoji: "🪐",
          color: 0xf0e6d0,
          size: 1.0,
          distance: 15,
          speed: 0.007,
          info: "Famous for its beautiful ring system. A gas giant with 82 confirmed moons.",
        },
        {
          name: "Uranus",
          emoji: "⛢",
          color: 0xb0e0e6,
          size: 0.85,
          distance: 18.5,
          speed: 0.005,
          info: "Rotates on its side. An ice giant with a pale blue color from methane in its atmosphere.",
        },
        {
          name: "Neptune",
          emoji: "♆",
          color: 0x4169e1,
          size: 0.85,
          distance: 22,
          speed: 0.004,
          info: "Deep blue color. Strongest winds in the solar system, reaching speeds of 2,100 km/h.",
        },
      ];

      // Store planets for animation
      const planets = [];

      // --- Create Sun ---
      const sunGeometry = new THREE.SphereGeometry(2.5, 64, 64);
      const sunMaterial = new THREE.MeshStandardMaterial({
        color: 0xffaa66,
        emissive: 0xff4411,
        emissiveIntensity: 0.8,
        metalness: 0.1,
        roughness: 0.5,
      });
      const sun = new THREE.Mesh(sunGeometry, sunMaterial);
      scene.add(sun);

      const sunGlowGeometry = new THREE.SphereGeometry(2.7, 32, 32);
      const sunGlowMaterial = new THREE.MeshBasicMaterial({
        color: 0xff8844,
        transparent: true,
        opacity: 0.2,
      });
      const sunGlow = new THREE.Mesh(sunGlowGeometry, sunGlowMaterial);
      scene.add(sunGlow);

      // Sun label
      const sunDiv = document.createElement("div");
      sunDiv.textContent = "☀️ Sun";
      sunDiv.style.color = "#ffaa44";
      sunDiv.style.fontSize = "20px";
      sunDiv.style.fontWeight = "bold";
      sunDiv.style.textShadow = "0 0 10px rgba(255,100,0,0.8)";
      const sunLabel = new CSS2DObject(sunDiv);
      sunLabel.position.set(0, 1.2, 0);
      scene.add(sunLabel);

      // --- Helper function to create planets ---
      function createPlanet(data) {
        const geometry = new THREE.SphereGeometry(data.size, 64, 64);
        const material = new THREE.MeshStandardMaterial({
          color: data.color,
          roughness: 0.4,
          metalness: 0.1,
        });
        const planet = new THREE.Mesh(geometry, material);
        planet.castShadow = true;
        planet.userData = {
          name: data.name,
          emoji: data.emoji,
          info: data.info,
          color: data.color,
          size: data.size,
          distance: data.distance,
        };

        planet.position.x = data.distance;

        // Create orbit line
        const orbitPoints = [];
        const orbitRadius = data.distance;
        for (let i = 0; i <= 128; i++) {
          const angle = (i / 128) * Math.PI * 2;
          const x = Math.cos(angle) * orbitRadius;
          const z = Math.sin(angle) * orbitRadius;
          orbitPoints.push(new THREE.Vector3(x, 0, z));
        }
        const orbitGeometry = new THREE.BufferGeometry().setFromPoints(
          orbitPoints,
        );
        const orbitMaterial = new THREE.LineBasicMaterial({
          color: 0x4488aa,
          transparent: true,
          opacity: 0.3,
        });
        const orbit = new THREE.LineLoop(orbitGeometry, orbitMaterial);
        scene.add(orbit);

        // Create CSS2D label
        const div = document.createElement("div");
        div.textContent = data.name;
        div.style.color = "#fff";
        div.style.fontSize = "14px";
        div.style.fontWeight = "bold";
        div.style.backgroundColor = "rgba(0,0,0,0.6)";
        div.style.padding = "2px 8px";
        div.style.borderRadius = "20px";
        div.style.border = `1px solid ${new THREE.Color(data.color).getStyle()}`;
        div.style.pointerEvents = "none";
        div.style.whiteSpace = "nowrap";
        const label = new CSS2DObject(div);
        label.position.set(0, data.size + 0.3, 0);
        planet.add(label);

        scene.add(planet);

        return {
          mesh: planet,
          distance: data.distance,
          speed: data.speed,
          angle: Math.random() * Math.PI * 2,
          name: data.name,
          emoji: data.emoji,
          info: data.info,
          color: data.color,
        };
      }

      // Create all planets
      planetsData.forEach((data) => {
        planets.push(createPlanet(data));
      });

      // Add Saturn's rings
      const saturnPlanet = planets.find((p) => p.name === "Saturn");
      if (saturnPlanet) {
        const ringGeometry = new THREE.TorusGeometry(1.4, 0.3, 32, 100);
        const ringMaterial = new THREE.MeshStandardMaterial({
          color: 0xc2b280,
          emissive: 0x332200,
          side: THREE.DoubleSide,
          transparent: true,
          opacity: 0.7,
        });
        const ring = new THREE.Mesh(ringGeometry, ringMaterial);
        ring.rotation.x = Math.PI / 2.2;
        ring.rotation.z = 0.3;
        saturnPlanet.mesh.add(ring);
      }

      // --- Tooltip handling ---
      const tooltip = document.getElementById("planetTooltip");
      const tooltipClose = document.getElementById("tooltipClose");
      let currentPlanet = null;

      function getFunFact(planetName) {
        const facts = {
          Mercury:
            "Despite being closest to the Sun, Mercury has ice in permanently shadowed craters!",
          Venus:
            "A day on Venus (243 Earth days) is longer than its year (225 Earth days)!",
          Earth: "Earth is the only planet not named after a god or goddess.",
          Mars: "Mars has the tallest volcano in the solar system - Olympus Mons, 21km high!",
          Jupiter:
            "Jupiter's Great Red Spot is a storm that has been raging for over 300 years!",
          Saturn:
            "Saturn would float in water if you could find a big enough ocean!",
          Uranus:
            "Uranus rotates on its side, possibly due to a massive collision long ago.",
          Neptune:
            "Neptune was the first planet discovered through mathematical predictions!",
        };
        return facts[planetName] || "A fascinating world in our solar system!";
      }

      function getPlanetDetails(planetName) {
        const details = {
          Mercury:
            '<div class="planet-detail"><span class="planet-detail-label">Diameter:</span> 4,879 km</div><div class="planet-detail"><span class="planet-detail-label">Day Length:</span> 59 Earth days</div><div class="planet-detail"><span class="planet-detail-label">Year Length:</span> 88 Earth days</div>',
          Venus:
            '<div class="planet-detail"><span class="planet-detail-label">Diameter:</span> 12,104 km</div><div class="planet-detail"><span class="planet-detail-label">Day Length:</span> 243 Earth days</div><div class="planet-detail"><span class="planet-detail-label">Year Length:</span> 225 Earth days</div>',
          Earth:
            '<div class="planet-detail"><span class="planet-detail-label">Diameter:</span> 12,742 km</div><div class="planet-detail"><span class="planet-detail-label">Day Length:</span> 24 hours</div><div class="planet-detail"><span class="planet-detail-label">Year Length:</span> 365.25 days</div>',
          Mars: '<div class="planet-detail"><span class="planet-detail-label">Diameter:</span> 6,779 km</div><div class="planet-detail"><span class="planet-detail-label">Day Length:</span> 24.6 hours</div><div class="planet-detail"><span class="planet-detail-label">Year Length:</span> 687 Earth days</div>',
          Jupiter:
            '<div class="planet-detail"><span class="planet-detail-label">Diameter:</span> 139,820 km</div><div class="planet-detail"><span class="planet-detail-label">Day Length:</span> 9.9 hours</div><div class="planet-detail"><span class="planet-detail-label">Year Length:</span> 11.9 Earth years</div><div class="planet-detail"><span class="planet-detail-label">Moons:</span> 79+</div>',
          Saturn:
            '<div class="planet-detail"><span class="planet-detail-label">Diameter:</span> 116,460 km</div><div class="planet-detail"><span class="planet-detail-label">Day Length:</span> 10.7 hours</div><div class="planet-detail"><span class="planet-detail-label">Year Length:</span> 29.5 Earth years</div><div class="planet-detail"><span class="planet-detail-label">Rings:</span> Yes, beautiful rings!</div>',
          Uranus:
            '<div class="planet-detail"><span class="planet-detail-label">Diameter:</span> 50,724 km</div><div class="planet-detail"><span class="planet-detail-label">Day Length:</span> 17.2 hours</div><div class="planet-detail"><span class="planet-detail-label">Year Length:</span> 84 Earth years</div>',
          Neptune:
            '<div class="planet-detail"><span class="planet-detail-label">Diameter:</span> 49,244 km</div><div class="planet-detail"><span class="planet-detail-label">Day Length:</span> 16.1 hours</div><div class="planet-detail"><span class="planet-detail-label">Year Length:</span> 165 Earth years</div>',
        };
        return details[planetName] || "";
      }

      function updateTooltipPosition(planetMesh) {
        // Get the 3D position of the planet in world coordinates
        const worldPosition = planetMesh.getWorldPosition(new THREE.Vector3());

        // Project 3D position to screen coordinates
        const vector = worldPosition.project(camera);

        // Convert to CSS coordinates
        const x = (vector.x * 0.5 + 0.5) * renderer.domElement.clientWidth;
        const y = -(vector.y * 0.5 - 0.5) * renderer.domElement.clientHeight;

        // Position tooltip near the planet (slightly above and to the side)
        tooltip.style.left = `${x + 20}px`;
        tooltip.style.top = `${y - 80}px`;
      }

      function showTooltip(planet) {
        const planetName = planet.name;
        const planetEmoji = planet.emoji;
        const planetInfo = planet.info;

        document.getElementById("tooltipEmoji").textContent = planetEmoji;
        document.getElementById("tooltipName").textContent = planetName;

        const details = getPlanetDetails(planetName);
        const funFact = getFunFact(planetName);

        document.getElementById("tooltipBody").innerHTML = `
                <p style="margin: 0 0 10px 0;">${planetInfo}</p>
                ${details}
                <div class="fun-fact">
                    <strong>✨ Fun Fact:</strong><br>
                    ${funFact}
                </div>
            `;

        // Position tooltip near the planet
        updateTooltipPosition(planet.mesh);

        tooltip.style.display = "block";
        currentPlanet = planet;

        // Add a temporary glow effect to the planet
        if (planet.mesh.material) {
          planet.mesh.userData.originalEmissive =
            planet.mesh.material.emissiveIntensity || 0;
          planet.mesh.material.emissiveIntensity = 0.3;
          planet.mesh.material.emissive = new THREE.Color(planet.color);
        }
      }

      function hideTooltip() {
        tooltip.style.display = "none";

        // Remove glow effect
        if (currentPlanet && currentPlanet.mesh.material) {
          currentPlanet.mesh.material.emissiveIntensity =
            currentPlanet.mesh.userData.originalEmissive || 0;
          if (currentPlanet.mesh.userData.originalEmissive === undefined) {
            currentPlanet.mesh.material.emissiveIntensity = 0;
          }
        }
        currentPlanet = null;
      }

      tooltipClose.onclick = (e) => {
        e.stopPropagation();
        hideTooltip();
      };

      // --- Raycaster for click interaction ---
      const raycaster = new THREE.Raycaster();
      const mouse = new THREE.Vector2();

      // --- Click handler for planets ---
      function onMouseClick(event) {
        // Calculate mouse position in normalized coordinates
        mouse.x = (event.clientX / renderer.domElement.clientWidth) * 2 - 1;
        mouse.y = -(event.clientY / renderer.domElement.clientHeight) * 2 + 1;

        raycaster.setFromCamera(mouse, camera);

        const intersects = raycaster.intersectObjects(planetsArray);

        if (intersects.length > 0) {
          const clickedPlanet = intersects[0].object;
          const planetData = planets.find((p) => p.mesh === clickedPlanet);
          if (planetData) {
            if (
              currentPlanet === planetData &&
              tooltip.style.display === "block"
            ) {
              hideTooltip();
            } else {
              showTooltip(planetData);
            }
          }
        } else {
          hideTooltip();
        }
      }

      // Add click event listener
      window.addEventListener("click", onMouseClick, false);

      // Update tooltip position on camera movement
      controls.addEventListener("change", () => {
        if (currentPlanet && tooltip.style.display === "block") {
          updateTooltipPosition(currentPlanet.mesh);
        }
      });

      // Also update on window resize
      window.addEventListener("resize", () => {
        if (currentPlanet && tooltip.style.display === "block") {
          updateTooltipPosition(currentPlanet.mesh);
        }
      });

      // --- Hover effect for planets ---
      let hoveredPlanet = null;

      function onMouseMove(event) {
        mouse.x = (event.clientX / renderer.domElement.clientWidth) * 2 - 1;
        mouse.y = -(event.clientY / renderer.domElement.clientHeight) * 2 + 1;

        raycaster.setFromCamera(mouse, camera);
        const planetMeshes = planets.map((p) => p.mesh);
        const intersects = raycaster.intersectObjects(planetMeshes);

        // Reset hovered planet scale
        if (hoveredPlanet) {
          hoveredPlanet.mesh.scale.set(1, 1, 1);
          hoveredPlanet = null;
        }

        if (intersects.length > 0) {
          const planet = intersects[0].object;
          hoveredPlanet = planets.find((p) => p.mesh === planet);
          if (hoveredPlanet) {
            planet.scale.set(1.1, 1.1, 1.1);
            document.body.style.cursor = "pointer";
          }
        } else {
          document.body.style.cursor = "auto";
        }
      }

      window.addEventListener("mousemove", onMouseMove, false);

      // --- Animation Loop ---
      function animate() {
        requestAnimationFrame(animate);

        // Update planet positions
        planets.forEach((planet) => {
          planet.angle += planet.speed * 0.6;
          const x = Math.cos(planet.angle) * planet.distance;
          const z = Math.sin(planet.angle) * planet.distance;
          planet.mesh.position.set(x, 0, z);
          planet.mesh.rotation.y += 0.01;
        });

        // Rotate stars slowly for ambiance
        stars.rotation.y += 0.0005;
        stars.rotation.x += 0.0003;
        sunGlow.rotation.y += 0.002;

        // Update tooltip position if visible
        if (currentPlanet && tooltip.style.display === "block") {
          updateTooltipPosition(currentPlanet.mesh);
        }

        // Update controls
        controls.update();

        // Render
        renderer.render(scene, camera);
        labelRenderer.render(scene, camera);
      }

      animate();

      // Handle window resize
      window.addEventListener("resize", onWindowResize, false);
      function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
      }

      console.log(
        "Solar System with Planet Tooltips initialized! Click on any planet to see info appear next to it.",
      );
    </script>
  </body>
</html>
